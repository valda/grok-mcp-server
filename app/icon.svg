<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2b35e"/>
      <stop offset="100%" stop-color="#c4872a"/>
    </linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a04a"/>
      <stop offset="100%" stop-color="#a06d1f"/>
    </linearGradient>
  </defs>
  <!-- Body: plump oval fish shape -->
  <ellipse cx="22" cy="25" rx="14" ry="10" fill="url(#body)"/>
  <!-- Tail fin -->
  <path d="M35 25 Q42 18 40 12 Q37 18 35 20Z" fill="url(#fin)"/>
  <path d="M35 25 Q42 32 40 38 Q37 32 35 30Z" fill="url(#fin)"/>
  <!-- Dorsal fin -->
  <path d="M18 15 Q22 8 28 14" fill="none" stroke="#c4872a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pectoral fin (small) -->
  <path d="M18 28 Q15 33 19 34" fill="url(#fin)" opacity="0.7"/>
  <!-- Eye: big and cute -->
  <circle cx="14" cy="22" r="4" fill="#0a0a0b"/>
  <circle cx="12.8" cy="20.8" r="1.5" fill="#fff"/>
  <!-- Mouth: slight smile -->
  <path d="M8 26 Q10 28 12 27" fill="none" stroke="#0a0a0b" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Subtle connection dots (proxy/signal motif) -->
  <circle cx="43" cy="12" r="1.2" fill="#d4a04a" opacity="0.5"/>
  <circle cx="45" cy="16" r="0.8" fill="#d4a04a" opacity="0.3"/>
  <circle cx="43" cy="38" r="1.2" fill="#d4a04a" opacity="0.5"/>
  <circle cx="45" cy="34" r="0.8" fill="#d4a04a" opacity="0.3"/>
</svg>
